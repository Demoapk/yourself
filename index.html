<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>简历生成器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18202f;
      --muted: #687386;
      --line: #d9dee8;
      --panel: #ffffff;
      --soft: #f5f7fb;
      --brand: #1c6f65;
      --brand-dark: #125047;
      --accent: #b54d32;
      --focus: rgba(28, 111, 101, 0.18);
      --shadow: 0 18px 50px rgba(28, 36, 54, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(28, 111, 101, 0.1), transparent 35%),
        linear-gradient(45deg, rgba(181, 77, 50, 0.1), transparent 40%),
        var(--soft);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 460px) minmax(0, 1fr);
    }

    .editor {
      height: 100vh;
      overflow: auto;
      padding: 22px;
      background: rgba(255, 255, 255, 0.82);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .preview-pane {
      height: 100vh;
      overflow: auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      color: white;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      box-shadow: 0 10px 22px rgba(28, 111, 101, 0.22);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .page-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }

    .page-tab {
      min-height: 52px;
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      color: var(--ink);
      background: white;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .page-tab:hover,
    .page-tab.active {
      transform: translateY(-1px);
      border-color: var(--brand);
      background: #fafffe;
    }

    .page-tab-number {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--brand-dark);
      background: #e7f3f0;
      font-weight: 700;
      font-size: 13px;
    }

    .page-tab.active .page-tab-number {
      color: white;
      background: var(--brand);
    }

    .page-tab strong {
      display: block;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-tab span:last-child {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--ink);
      background: white;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(28, 111, 101, 0.45);
      background: #fafffe;
    }

    .btn.primary {
      color: white;
      background: var(--brand);
      border-color: var(--brand);
    }

    .btn.primary:hover {
      background: var(--brand-dark);
    }

    .btn svg,
    .icon {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }

    .template-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      color: var(--ink);
      background: white;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    .template-card:hover,
    .template-card.active {
      transform: translateY(-1px);
      border-color: var(--brand);
      box-shadow: 0 8px 22px rgba(28, 36, 54, 0.1);
    }

    .template-preview {
      height: 48px;
      display: grid;
      gap: 5px;
      margin-bottom: 7px;
      border-radius: 6px;
      padding: 7px;
      background: #f4f7fa;
      overflow: hidden;
    }

    .template-preview span {
      display: block;
      height: 5px;
      border-radius: 999px;
      background: #c8d0dc;
    }

    .template-preview span:first-child {
      width: 65%;
      height: 8px;
      background: var(--brand);
    }

    .template-card strong {
      display: block;
      overflow: hidden;
      color: #2c3545;
      font-size: 12px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .template-card small {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .template-preview.sidebar {
      grid-template-columns: 18px 1fr;
      background: linear-gradient(90deg, #254e58 0 22px, #f4f7fa 22px);
    }

    .template-preview.sidebar span {
      grid-column: 2;
    }

    .template-preview.timeline span {
      margin-left: 11px;
    }

    .template-preview.timeline {
      background: linear-gradient(90deg, transparent 0 12px, #b54d32 12px 15px, transparent 15px), #f4f7fa;
    }

    .template-preview.minimal span:first-child {
      background: #222831;
    }

    .template-preview.portfolio {
      background: linear-gradient(135deg, #20314b 0 48%, #f3c969 48% 54%, #f4f7fa 54%);
    }

    .section {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .page-panel {
      display: none;
    }

    .page-panel.active {
      display: block;
    }

    .page-intro {
      margin: -4px 0 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 15px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      background: white;
      outline: none;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--focus);
    }

    textarea {
      min-height: 88px;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .item {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
    }

    .item-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .item-head strong {
      font-size: 13px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: white;
      cursor: pointer;
    }

    .icon-btn:hover {
      color: var(--accent);
      border-color: rgba(181, 77, 50, 0.42);
    }

    .resume-wrap {
      max-width: 940px;
      margin: 0 auto;
      display: grid;
      gap: 26px;
    }

    .resume-page {
      display: grid;
      gap: 8px;
    }

    .page-label {
      justify-self: end;
      color: var(--muted);
      font-size: 12px;
    }

    .paper {
      width: 794px;
      height: 1123px;
      padding: 58px 66px;
      background: white;
      box-shadow: var(--shadow);
    }

    .resume-measure {
      position: absolute;
      left: -99999px;
      top: 0;
      width: 794px;
      visibility: hidden;
      pointer-events: none;
    }

    .resume-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      padding-bottom: 22px;
      border-bottom: 3px solid var(--brand);
    }

    .resume-header h2 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .target-role {
      margin: 8px 0 0;
      color: var(--brand);
      font-size: 18px;
      font-weight: 700;
    }

    .contact {
      display: grid;
      gap: 5px;
      min-width: 220px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .resume-section {
      margin-top: 24px;
    }

    .resume-section h3 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 12px;
      color: var(--brand-dark);
      font-size: 16px;
      letter-spacing: 0;
    }

    .resume-section h3::before {
      content: "";
      width: 6px;
      height: 18px;
      border-radius: 3px;
      background: var(--accent);
    }

    .summary {
      margin: 0;
      color: #394457;
    }

    .resume-item {
      margin-top: 14px;
      break-inside: avoid;
    }

    .resume-item:first-of-type {
      margin-top: 0;
    }

    .row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 4px;
    }

    .row strong {
      font-size: 15px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .subline {
      margin: 0 0 6px;
      color: #414b5d;
      font-size: 13px;
      font-weight: 650;
    }

    ul.clean-list {
      margin: 6px 0 0;
      padding-left: 18px;
    }

    ul.clean-list li {
      margin: 4px 0;
    }

    .skills-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 8px;
      color: var(--brand-dark);
      background: #e7f3f0;
      font-size: 13px;
    }

    .empty-hint {
      color: var(--muted);
      font-size: 14px;
    }

    .paper[data-template="classic"] {
      --resume-brand: #1c6f65;
      --resume-brand-dark: #125047;
      --resume-accent: #b54d32;
    }

    .paper[data-template="classic"] .resume-header {
      border-bottom-color: var(--resume-brand);
    }

    .paper[data-template="classic"] .target-role,
    .paper[data-template="classic"] .resume-section h3 {
      color: var(--resume-brand-dark);
    }

    .paper[data-template="classic"] .resume-section h3::before {
      background: var(--resume-accent);
    }

    .paper[data-template="sidebar"] {
      position: relative;
      display: block;
      padding: 54px 54px 48px 269px;
      overflow: hidden;
    }

    .paper[data-template="sidebar"] .resume-header {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      display: block;
      width: 235px;
      height: 100%;
      padding: 54px 24px;
      color: white;
      background: #254e58;
      border-bottom: 0;
    }

    .paper[data-template="sidebar"] .resume-header h2 {
      font-size: 31px;
    }

    .paper[data-template="sidebar"] .target-role,
    .paper[data-template="sidebar"] .contact {
      color: rgba(255, 255, 255, 0.86);
      text-align: left;
    }

    .paper[data-template="sidebar"] .contact {
      min-width: 0;
      margin-top: 26px;
      gap: 9px;
    }

    .paper[data-template="sidebar"] .resume-section {
      margin-top: 26px;
    }

    .paper[data-template="sidebar"] .resume-section:first-of-type {
      margin-top: 0;
    }

    .paper[data-template="sidebar"] .resume-section h3 {
      color: #254e58;
      border-bottom: 1px solid #d7e2e4;
      padding-bottom: 7px;
    }

    .paper[data-template="sidebar"] .resume-section h3::before {
      width: 18px;
      height: 3px;
      background: #e0a13a;
    }

    .paper[data-template="sidebar"] .skill-pill {
      color: #254e58;
      background: #e8f0f1;
    }

    .paper[data-template="sidebar"][data-continuation="false"] {
      padding-left: 269px;
    }

    .paper[data-template="sidebar"][data-continuation="true"] {
      padding: 54px 54px 48px 48px;
      background: linear-gradient(90deg, #254e58 0 18px, #ffffff 18px);
    }

    .paper[data-template="sidebar"][data-continuation="true"] .resume-section:first-child {
      margin-top: 0;
    }

    .paper[data-template="timeline"] {
      --timeline-line: #c86243;
      padding-left: 76px;
    }

    .paper[data-template="timeline"] .resume-header {
      border-bottom: 1px solid #cfd5de;
    }

    .paper[data-template="timeline"] .resume-header h2 {
      font-size: 38px;
    }

    .paper[data-template="timeline"] .target-role,
    .paper[data-template="timeline"] .resume-section h3 {
      color: #263b5e;
    }

    .paper[data-template="timeline"] .resume-section {
      position: relative;
      padding-left: 28px;
    }

    .paper[data-template="timeline"] .resume-section::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 32px;
      bottom: 0;
      width: 2px;
      background: #e3e7ee;
    }

    .paper[data-template="timeline"] .resume-section h3::before {
      width: 14px;
      height: 14px;
      border: 3px solid #f7f9fc;
      border-radius: 50%;
      background: var(--timeline-line);
      box-shadow: 0 0 0 2px var(--timeline-line);
      transform: translateX(-28px);
    }

    .paper[data-template="timeline"] .resume-item {
      position: relative;
    }

    .paper[data-template="timeline"] .resume-item::before {
      content: "";
      position: absolute;
      left: -27px;
      top: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--timeline-line);
    }

    .paper[data-template="minimal"] {
      color: #1f2329;
      padding: 64px 74px;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .paper[data-template="minimal"] .resume-header {
      display: block;
      padding-bottom: 16px;
      border-bottom: 1px solid #1f2329;
    }

    .paper[data-template="minimal"] .resume-header h2 {
      font-size: 32px;
      font-weight: 800;
    }

    .paper[data-template="minimal"] .target-role {
      color: #4e5969;
      font-size: 15px;
    }

    .paper[data-template="minimal"] .contact {
      display: flex;
      flex-wrap: wrap;
      min-width: 0;
      gap: 8px 14px;
      margin-top: 13px;
      text-align: left;
    }

    .paper[data-template="minimal"] .resume-section {
      margin-top: 21px;
    }

    .paper[data-template="minimal"] .resume-section h3 {
      color: #1f2329;
      font-size: 14px;
      text-transform: uppercase;
    }

    .paper[data-template="minimal"] .resume-section h3::before {
      display: none;
    }

    .paper[data-template="minimal"] .skill-pill {
      color: #1f2329;
      background: #eef0f3;
    }

    .paper[data-template="portfolio"] {
      padding: 0 54px 54px;
      background:
        linear-gradient(135deg, #20314b 0 280px, transparent 280px),
        #ffffff;
    }

    .paper[data-template="portfolio"] .resume-header {
      margin: 0 -54px 28px;
      padding: 54px;
      color: white;
      border-bottom: 0;
    }

    .paper[data-template="portfolio"] .resume-header h2 {
      max-width: 520px;
      font-size: 42px;
    }

    .paper[data-template="portfolio"] .target-role {
      color: #f3c969;
    }

    .paper[data-template="portfolio"] .contact {
      color: rgba(255, 255, 255, 0.82);
    }

    .paper[data-template="portfolio"] .resume-section {
      margin-top: 18px;
      padding: 18px 20px;
      border: 1px solid #e1e5ec;
      border-radius: 8px;
      background: #fbfcfe;
    }

    .paper[data-template="portfolio"] .resume-section h3 {
      color: #20314b;
    }

    .paper[data-template="portfolio"] .resume-section h3::before {
      background: #f3c969;
    }

    .paper[data-template="portfolio"] .skill-pill {
      color: #20314b;
      background: #fff1c7;
    }

    .paper[data-template="portfolio"][data-continuation="true"] {
      padding: 54px;
      background: #ffffff;
    }

    .paper[data-template="portfolio"][data-continuation="true"] .resume-section {
      margin-top: 18px;
    }

    .paper[data-template="portfolio"][data-continuation="true"] .resume-section:first-child {
      margin-top: 0;
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .editor,
      .preview-pane {
        height: auto;
        overflow: visible;
      }

      .resume-wrap {
        max-width: 100%;
      }

      .paper {
        width: 100%;
        padding: 38px 28px;
      }
    }

    @media (max-width: 620px) {
      .editor,
      .preview-pane {
        padding: 16px;
      }

      .topbar,
      .resume-header,
      .row {
        display: grid;
        grid-template-columns: 1fr;
      }

      .contact {
        text-align: left;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .paper {
        min-height: 0;
        padding: 28px 20px;
      }

      .paper[data-template="sidebar"],
      .paper[data-template="timeline"],
      .paper[data-template="minimal"],
      .paper[data-template="portfolio"] {
        display: block;
        padding: 28px 20px;
        background: white;
      }

      .paper[data-template="sidebar"] .resume-header {
        min-height: 0;
        margin: -28px -20px 24px;
        padding: 28px 20px;
      }

      .paper[data-template="portfolio"] .resume-header {
        margin: -28px -20px 24px;
        padding: 30px 20px;
      }

      .paper[data-template="sidebar"] .resume-section:first-of-type {
        margin-top: 24px;
      }

      .resume-header h2 {
        font-size: 28px;
      }

      .meta {
        white-space: normal;
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 0;
      }

      body {
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .editor {
        display: none;
      }

      .app-shell {
        display: block;
      }

      .preview-pane {
        height: auto;
        overflow: visible;
        padding: 0;
      }

      .resume-wrap {
        display: block;
        max-width: none;
        margin: 0;
      }

      .resume-page {
        display: block;
        page-break-after: always;
      }

      .resume-page:last-child {
        page-break-after: auto;
      }

      .page-label,
      .resume-measure {
        display: none;
      }

      .paper {
        width: 210mm;
        height: 297mm;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <aside class="editor" aria-label="简历信息编辑区">
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none">
              <path d="M7 4h7l3 3v13H7V4Z" stroke="currentColor" stroke-width="2"/>
              <path d="M14 4v4h4M9 12h6M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h1>简历生成器</h1>
            <p>填写后实时生成可导出的简历</p>
          </div>
        </div>
      </div>

      <nav class="page-tabs" id="pageTabs" aria-label="简历制作页面"></nav>

      <section class="section page-panel" data-page="template">
        <div class="section-title"><h2>简历模板</h2></div>
        <p class="page-intro">选择适合当前求职场景的版式，右侧预览会同步变化。</p>
        <div class="template-grid" id="templateGrid" aria-label="选择简历模板"></div>
      </section>

      <section class="section page-panel" data-page="profile">
        <div class="section-title"><h2>基本信息</h2></div>
        <p class="page-intro">先补齐姓名、求职方向、联系方式和个人优势。</p>
        <div class="field-grid">
          <label>姓名<input data-field="name" placeholder="张三"></label>
          <label>求职方向<input data-field="title" placeholder="前端开发工程师"></label>
          <label>电话<input data-field="phone" placeholder="138 0000 0000"></label>
          <label>邮箱<input data-field="email" placeholder="name@email.com"></label>
          <label>城市<input data-field="city" placeholder="上海"></label>
          <label>个人主页<input data-field="website" placeholder="github.com/name"></label>
          <label class="wide">个人优势<textarea data-field="summary" placeholder="用 2-4 句话概括你的能力、行业经验和亮点。"></textarea></label>
          <label class="wide">技能关键词<input data-field="skills" placeholder="JavaScript, React, 数据分析, 项目管理"></label>
        </div>
      </section>

      <section class="section page-panel" data-page="experience">
        <div class="section-title">
          <h2>教育经历</h2>
          <button class="icon-btn" data-add="education" type="button" title="添加教育经历">+</button>
        </div>
        <div id="educationList"></div>
      </section>

      <section class="section page-panel" data-page="experience">
        <div class="section-title">
          <h2>工作经历</h2>
          <button class="icon-btn" data-add="work" type="button" title="添加工作经历">+</button>
        </div>
        <div id="workList"></div>
      </section>

      <section class="section page-panel" data-page="experience">
        <div class="section-title">
          <h2>项目经历</h2>
          <button class="icon-btn" data-add="project" type="button" title="添加项目经历">+</button>
        </div>
        <div id="projectList"></div>
      </section>

      <section class="section page-panel" data-page="experience">
        <div class="section-title">
          <h2>取得成果</h2>
          <button class="icon-btn" data-add="achievement" type="button" title="添加成果">+</button>
        </div>
        <div id="achievementList"></div>
      </section>

      <section class="section page-panel" data-page="export">
        <div class="section-title"><h2>预览导出</h2></div>
        <p class="page-intro">确认右侧简历效果后，可以导出 Word 或保存为 PDF。</p>
        <div class="actions">
          <button class="btn primary" id="exportWord" type="button" title="导出 Word 文件">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 19h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Word
          </button>
          <button class="btn" id="exportPdf" type="button" title="打开打印窗口并保存为 PDF">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 9V3h12v6M6 17H4v-6h16v6h-2M7 14h10v7H7v-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            PDF
          </button>
          <button class="btn" id="resetDemo" type="button" title="恢复示例内容">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7M3 4v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            示例
          </button>
        </div>
      </section>
    </aside>

    <section class="preview-pane" aria-label="简历预览区">
      <div class="resume-wrap" id="resumePreview" aria-live="polite"></div>
      <div class="resume-measure" id="resumeMeasure" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const storageKey = "resume-generator-data-v1";

    const templates = [
      { id: "classic", name: "经典商务", desc: "稳重通用" },
      { id: "sidebar", name: "侧栏重点", desc: "信息清晰" },
      { id: "timeline", name: "时间线", desc: "经历突出" },
      { id: "minimal", name: "极简黑白", desc: "ATS 友好" },
      { id: "portfolio", name: "作品集感", desc: "设计鲜明" }
    ];

    const pages = [
      { id: "profile", name: "基础信息", desc: "身份与优势" },
      { id: "experience", name: "经历内容", desc: "学校工作项目" },
      { id: "template", name: "模板样式", desc: "选择版式" },
      { id: "export", name: "预览导出", desc: "Word / PDF" }
    ];

    const demoData = {
      template: "classic",
      page: "profile",
      name: "林一诺",
      title: "产品运营经理",
      phone: "138 0000 0000",
      email: "linyinuo@example.com",
      city: "上海",
      website: "linkedin.com/in/linyinuo",
      summary: "6 年互联网产品运营经验，擅长从用户洞察、增长实验到跨团队落地推进完整闭环。曾负责千万级用户产品的留存提升与商业化增长，具备数据分析、内容策略和项目管理能力。",
      skills: "用户增长, 数据分析, SQL, A/B 测试, 内容运营, 项目管理",
      education: [
        { school: "复旦大学", major: "新闻传播学 本科", time: "2014.09 - 2018.06", detail: "主修传播学、消费者行为与数据新闻，连续两年获得校级奖学金。" }
      ],
      work: [
        { company: "星河科技", role: "高级产品运营经理", time: "2022.03 - 至今", detail: "负责核心 App 新用户激活与会员转化，搭建分层触达策略，将新用户 7 日留存率提升 18%。\n推进跨部门增长实验机制，季度内完成 24 个实验并沉淀指标看板。\n联合产品与算法团队优化推荐链路，使会员试用转化率提升 12%。" },
        { company: "云启内容", role: "运营经理", time: "2018.07 - 2022.02", detail: "搭建内容供给与作者激励体系，月活跃创作者增长 45%。\n负责节日营销活动策划，单场活动带来 320 万曝光和 9.6 万新增用户。" }
      ],
      project: [
        { name: "会员增长自动化项目", role: "项目负责人", time: "2025.01 - 2025.05", detail: "整合用户行为、权益偏好与渠道数据，设计自动化触达流程。\n将人工配置时间从每周 8 小时降至 1 小时，付费转化率提升 10.4%。" }
      ],
      achievement: [
        { name: "年度优秀项目奖", time: "2025", detail: "因会员增长自动化项目获得公司年度优秀项目奖。" },
        { name: "数据分析体系建设", time: "2024", detail: "主导运营指标口径统一，建立日常监控和异常归因流程。" }
      ]
    };

    let data = loadData();

    const listConfig = {
      education: {
        target: "educationList",
        title: "教育经历",
        fields: [
          ["school", "学校", "清华大学"],
          ["major", "专业 / 学历", "计算机科学与技术 本科"],
          ["time", "时间", "2020.09 - 2024.06"],
          ["detail", "补充说明", "主修课程、奖学金、校园经历等", "textarea"]
        ],
        empty: { school: "", major: "", time: "", detail: "" }
      },
      work: {
        target: "workList",
        title: "工作经历",
        fields: [
          ["company", "公司", "某某科技有限公司"],
          ["role", "职位", "产品经理"],
          ["time", "时间", "2024.01 - 至今"],
          ["detail", "工作内容", "每行写一条职责或成果，建议包含动作、方法和结果。", "textarea"]
        ],
        empty: { company: "", role: "", time: "", detail: "" }
      },
      project: {
        target: "projectList",
        title: "项目经历",
        fields: [
          ["name", "项目名称", "智能客服系统"],
          ["role", "角色", "项目负责人"],
          ["time", "时间", "2024.03 - 2024.06"],
          ["detail", "项目内容", "项目背景、你的职责、技术/方法、最终结果。", "textarea"]
        ],
        empty: { name: "", role: "", time: "", detail: "" }
      },
      achievement: {
        target: "achievementList",
        title: "成果",
        fields: [
          ["name", "成果名称", "年度优秀员工"],
          ["time", "时间", "2024"],
          ["detail", "说明", "奖项、证书、专利、论文、可量化业务结果等。", "textarea"]
        ],
        empty: { name: "", time: "", detail: "" }
      }
    };

    function loadData() {
      try {
        const saved = localStorage.getItem(storageKey);
        const parsed = saved ? JSON.parse(saved) : structuredClone(demoData);
        return normalizeData(parsed);
      } catch (error) {
        return normalizeData(structuredClone(demoData));
      }
    }

    function normalizeData(source) {
      return {
        ...structuredClone(demoData),
        ...source,
        page: pages.some((page) => page.id === source?.page) ? source.page : "profile",
        template: templates.some((template) => template.id === source?.template) ? source.template : "classic",
        education: Array.isArray(source?.education) ? source.education : structuredClone(demoData.education),
        work: Array.isArray(source?.work) ? source.work : structuredClone(demoData.work),
        project: Array.isArray(source?.project) ? source.project : structuredClone(demoData.project),
        achievement: Array.isArray(source?.achievement) ? source.achievement : structuredClone(demoData.achievement)
      };
    }

    function saveData() {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function linesToList(text) {
      const lines = String(text || "")
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);

      if (!lines.length) return "";
      return `<ul class="clean-list">${lines.map((line) => `<li>${escapeHtml(line)}</li>`).join("")}</ul>`;
    }

    function fillBaseFields() {
      document.querySelectorAll("[data-field]").forEach((field) => {
        field.value = data[field.dataset.field] || "";
      });
    }

    function renderEditorList(type) {
      const config = listConfig[type];
      const container = document.getElementById(config.target);
      container.innerHTML = "";

      data[type].forEach((item, index) => {
        const block = document.createElement("div");
        block.className = "item";
        block.innerHTML = `
          <div class="item-head">
            <strong>${config.title} ${index + 1}</strong>
            <button class="icon-btn" data-remove="${type}" data-index="${index}" type="button" title="删除">×</button>
          </div>
          <div class="field-grid">
            ${config.fields.map(([key, label, placeholder, kind]) => {
              const value = escapeHtml(item[key]);
              if (kind === "textarea") {
                return `<label class="wide">${label}<textarea data-list="${type}" data-index="${index}" data-key="${key}" placeholder="${placeholder}">${value}</textarea></label>`;
              }
              return `<label>${label}<input data-list="${type}" data-index="${index}" data-key="${key}" value="${value}" placeholder="${placeholder}"></label>`;
            }).join("")}
          </div>
        `;
        container.appendChild(block);
      });
    }

    function renderAllEditorLists() {
      Object.keys(listConfig).forEach(renderEditorList);
    }

    function renderPageTabs() {
      const container = document.getElementById("pageTabs");
      container.innerHTML = pages.map((page, index) => `
        <button class="page-tab ${data.page === page.id ? "active" : ""}" data-page-nav="${page.id}" type="button" title="进入${page.name}">
          <span class="page-tab-number">${index + 1}</span>
          <span>
            <strong>${page.name}</strong>
            <span>${page.desc}</span>
          </span>
        </button>
      `).join("");
    }

    function renderActivePage() {
      document.querySelectorAll("[data-page]").forEach((panel) => {
        panel.classList.toggle("active", panel.dataset.page === data.page);
      });
    }

    function renderTemplatePicker() {
      const container = document.getElementById("templateGrid");
      container.innerHTML = templates.map((template) => `
        <button class="template-card ${data.template === template.id ? "active" : ""}" data-template="${template.id}" type="button" title="切换到${template.name}">
          <span class="template-preview ${template.id}" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </span>
          <strong>${template.name}</strong>
          <small>${template.desc}</small>
        </button>
      `).join("");
    }

    function sectionHtml(title, content) {
      if (!content) return "";
      return `<section class="resume-section"><h3>${title}</h3>${content}</section>`;
    }

    function sectionBlocks(title, items) {
      return items.filter(Boolean).map((item, index) => `
        <section class="resume-section">
          <h3>${index === 0 ? title : `${title}（续）`}</h3>
          ${item}
        </section>
      `);
    }

    function buildResumeBlocks() {
      const contact = [data.phone, data.email, data.city, data.website]
        .filter(Boolean)
        .map((item) => `<span>${escapeHtml(item)}</span>`)
        .join("");

      const skills = String(data.skills || "")
        .split(/[,，、]/)
        .map((skill) => skill.trim())
        .filter(Boolean)
        .map((skill) => `<span class="skill-pill">${escapeHtml(skill)}</span>`)
        .join("");

      const educationItems = data.education.map((item) => `
        <div class="resume-item">
          <div class="row"><strong>${escapeHtml(item.school || "学校名称")}</strong><span class="meta">${escapeHtml(item.time)}</span></div>
          <p class="subline">${escapeHtml(item.major)}</p>
          ${linesToList(item.detail)}
        </div>
      `);

      const workItems = data.work.map((item) => `
        <div class="resume-item">
          <div class="row"><strong>${escapeHtml(item.company || "公司名称")}</strong><span class="meta">${escapeHtml(item.time)}</span></div>
          <p class="subline">${escapeHtml(item.role)}</p>
          ${linesToList(item.detail)}
        </div>
      `);

      const projectItems = data.project.map((item) => `
        <div class="resume-item">
          <div class="row"><strong>${escapeHtml(item.name || "项目名称")}</strong><span class="meta">${escapeHtml(item.time)}</span></div>
          <p class="subline">${escapeHtml(item.role)}</p>
          ${linesToList(item.detail)}
        </div>
      `);

      const achievementItems = data.achievement.map((item) => `
        <div class="resume-item">
          <div class="row"><strong>${escapeHtml(item.name || "成果名称")}</strong><span class="meta">${escapeHtml(item.time)}</span></div>
          ${linesToList(item.detail)}
        </div>
      `);

      return {
        header: `
          <header class="resume-header">
            <div>
              <h2>${escapeHtml(data.name || "你的姓名")}</h2>
              <p class="target-role">${escapeHtml(data.title || "目标职位")}</p>
            </div>
            <div class="contact">${contact || "<span>填写联系方式后会显示在这里</span>"}</div>
          </header>
        `,
        sections: [
          sectionHtml("个人优势", data.summary ? `<p class="summary">${escapeHtml(data.summary)}</p>` : `<p class="empty-hint">填写个人优势后会显示在这里。</p>`),
          sectionHtml("技能关键词", skills ? `<div class="skills-line">${skills}</div>` : ""),
          ...sectionBlocks("教育经历", educationItems),
          ...sectionBlocks("工作经历", workItems),
          ...sectionBlocks("项目经历", projectItems),
          ...sectionBlocks("取得成果", achievementItems)
        ].filter(Boolean)
      };
    }

    function createPreviewPage(pageNumber, blocks) {
      const pageIndex = pageNumber - 1;
      const isContinuation = pageIndex > 0;
      return `
        <div class="resume-page" data-page-index="${pageIndex}">
          <div class="page-label">第 ${pageNumber} 页</div>
          <article class="paper" data-template="${data.template}" data-page-index="${pageIndex}" data-continuation="${isContinuation}">
            ${blocks.join("")}
          </article>
        </div>
      `;
    }

    function createMeasurePaper(isContinuation) {
      const measure = document.getElementById("resumeMeasure");
      measure.innerHTML = `<article class="paper" data-template="${data.template}" data-continuation="${isContinuation}"></article>`;
      return measure.querySelector(".paper");
    }

    function canFitBlock(paper, block, maxHeight) {
      const marker = document.createElement("div");
      marker.innerHTML = block;
      const element = marker.firstElementChild;
      paper.appendChild(element);
      const fits = paper.scrollHeight <= maxHeight;
      element.remove();
      return fits;
    }

    function paginateResume(blocks) {
      let isContinuation = false;
      let measurePaper = createMeasurePaper(isContinuation);
      const pages = [];
      let currentBlocks = [blocks.header];

      measurePaper.innerHTML = currentBlocks.join("");

      blocks.sections.forEach((section) => {
        if (canFitBlock(measurePaper, section, measurePaper.clientHeight)) {
          currentBlocks.push(section);
          measurePaper.innerHTML = currentBlocks.join("");
          return;
        }

        pages.push(currentBlocks);
        isContinuation = true;
        currentBlocks = [section];
        measurePaper = createMeasurePaper(isContinuation);
        measurePaper.innerHTML = currentBlocks.join("");
      });

      if (currentBlocks.length) {
        pages.push(currentBlocks);
      }

      return pages.length ? pages : [[blocks.header]];
    }

    function renderResume() {
      const preview = document.getElementById("resumePreview");
      const blocks = buildResumeBlocks();
      const pages = paginateResume(blocks);

      preview.innerHTML = pages
        .map((pageBlocks, index) => createPreviewPage(index + 1, pageBlocks))
        .join("");
    }

    function render() {
      fillBaseFields();
      renderPageTabs();
      renderActivePage();
      renderTemplatePicker();
      renderAllEditorLists();
      renderResume();
      saveData();
    }

    function getResumeExportHtml() {
      const clone = document.createElement("div");
      clone.innerHTML = document.getElementById("resumePreview").innerHTML;
      clone.querySelectorAll(".page-label").forEach((label) => label.remove());
      return clone.innerHTML;
    }

    function downloadWord() {
      const content = getResumeExportHtml();
      const styles = Array.from(document.querySelectorAll("style")).map((style) => style.innerHTML).join("\n");
      const html = `
        <!doctype html>
        <html>
          <head>
            <meta charset="utf-8">
            <style>${styles}</style>
          </head>
          <body>
            <div class="resume-wrap">${content}</div>
          </body>
        </html>
      `;
      const blob = new Blob(["\ufeff", html], { type: "application/msword;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const fileName = `${data.name || "简历"}-${data.title || "个人简历"}.doc`.replace(/[\\/:*?"<>|]/g, "-");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function exportPdf() {
      const content = getResumeExportHtml();
      const styles = Array.from(document.querySelectorAll("style")).map((style) => style.innerHTML).join("\n");
      const printWindow = window.open("", "_blank", "width=920,height=1200");

      if (!printWindow) {
        window.print();
        return;
      }

      printWindow.document.open();
      printWindow.document.write(`
        <!doctype html>
        <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <title>${escapeHtml(data.name || "简历")} - PDF</title>
            <style>
              ${styles}
              html,
              body {
                width: 210mm;
                margin: 0 auto;
                background: white;
              }

              body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
              }

              .pdf-export {
                width: 210mm;
                margin: 0 auto;
                background: white;
              }

              .pdf-export .resume-wrap {
                display: block;
                width: 210mm;
                max-width: none;
                margin: 0;
              }

              .pdf-export .page-label {
                display: none;
              }

              .pdf-export .resume-page {
                page-break-after: always;
              }

              .pdf-export .resume-page:last-child {
                page-break-after: auto;
              }

              .pdf-export .paper {
                width: 210mm;
                height: 297mm;
                padding: 58px 66px;
                box-shadow: none;
              }

              .pdf-export .paper[data-template="classic"] {
                display: block;
                padding: 58px 66px;
                background: white;
              }

              .pdf-export .paper[data-template="sidebar"] {
                position: relative;
                display: block;
                padding: 54px 54px 48px 269px;
                background: white;
              }

              .pdf-export .paper[data-template="sidebar"][data-continuation="true"] {
                padding: 54px 54px 48px 48px;
                background: linear-gradient(90deg, #254e58 0 18px, #ffffff 18px);
              }

              .pdf-export .paper[data-template="timeline"] {
                display: block;
                padding: 58px 66px 58px 76px;
                background: white;
              }

              .pdf-export .paper[data-template="minimal"] {
                display: block;
                padding: 64px 74px;
                background: white;
              }

              .pdf-export .paper[data-template="portfolio"] {
                display: block;
                padding: 0 54px 54px;
                background:
                  linear-gradient(135deg, #20314b 0 280px, transparent 280px),
                  #ffffff;
              }

              .pdf-export .paper[data-template="portfolio"][data-continuation="true"] {
                padding: 54px;
                background: #ffffff;
              }

              @media print {
                html,
                body,
                .pdf-export,
                .pdf-export .resume-wrap {
                  width: 210mm;
                  margin: 0;
                }

                .pdf-export .paper[data-template="classic"] {
                  padding: 58px 66px;
                }

                .pdf-export .paper[data-template="sidebar"] {
                  display: block;
                  padding: 54px 54px 48px 269px;
                }

                .pdf-export .paper[data-template="sidebar"][data-continuation="true"] {
                  padding: 54px 54px 48px 48px;
                }

                .pdf-export .paper[data-template="timeline"] {
                  padding: 58px 66px 58px 76px;
                }

                .pdf-export .paper[data-template="minimal"] {
                  padding: 64px 74px;
                }

                .pdf-export .paper[data-template="portfolio"] {
                  padding: 0 54px 54px;
                }

                .pdf-export .paper[data-template="portfolio"][data-continuation="true"] {
                  padding: 54px;
                }
              }
            </style>
          </head>
          <body>
            <div class="pdf-export">
              <div class="resume-wrap">${content}</div>
            </div>
            <script>
              window.addEventListener("load", () => {
                setTimeout(() => {
                  window.focus();
                  window.print();
                }, 120);
              });
            <\/script>
          </body>
        </html>
      `);
      printWindow.document.close();
    }

    function bindEvents() {
      document.addEventListener("input", (event) => {
        const baseField = event.target.dataset.field;
        if (baseField) {
          data[baseField] = event.target.value;
          renderResume();
          saveData();
          return;
        }

        const listType = event.target.dataset.list;
        if (listType) {
          const index = Number(event.target.dataset.index);
          const key = event.target.dataset.key;
          data[listType][index][key] = event.target.value;
          renderResume();
          saveData();
        }
      });

      document.addEventListener("click", (event) => {
        const pageButton = event.target.closest("[data-page-nav]");
        const templateButton = event.target.closest(".template-card[data-template]");
        const addType = event.target.dataset.add;
        const removeType = event.target.dataset.remove;

        if (pageButton) {
          data.page = pageButton.dataset.pageNav;
          renderPageTabs();
          renderActivePage();
          saveData();
          return;
        }

        if (templateButton) {
          data.template = templateButton.dataset.template;
          renderTemplatePicker();
          renderResume();
          saveData();
          return;
        }

        if (addType) {
          data[addType].push({ ...listConfig[addType].empty });
          render();
          return;
        }

        if (removeType) {
          const index = Number(event.target.dataset.index);
          data[removeType].splice(index, 1);
          render();
        }
      });

      document.getElementById("exportWord").addEventListener("click", downloadWord);
      document.getElementById("exportPdf").addEventListener("click", exportPdf);
      document.getElementById("resetDemo").addEventListener("click", () => {
        data = normalizeData(structuredClone(demoData));
        render();
      });
    }

    bindEvents();
    render();
  </script>
</body>
</html>
